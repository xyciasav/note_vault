name: Build macOS prerelease

on:
  push:
    branches:
      - codex/1.3-local-relationships
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to upload the macOS build to
        required: true
        default: v1.3.0-beta.1

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS x64
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag || 'v1.3.0-beta.1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npx electron-builder --mac dmg zip --x64 --publish never

      - name: List release files
        run: find release -maxdepth 1 -type f -print

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-notes-macos-x64
          path: |
            release/*.dmg
            release/*.zip

      - name: Upload macOS files to prerelease
        run: gh release upload "$RELEASE_TAG" release/*.dmg release/*.zip --repo xyciasav/note_vault --clobber
